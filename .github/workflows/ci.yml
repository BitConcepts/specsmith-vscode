name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run lint

      - name: esbuild bundle
        run: npm run build

      - name: Check for vulnerabilities
        # serialize-javascript (mocha dep) has high-severity CVEs but is dev-only
        # and unfixed upstream (mocha hasn't bumped it). Use critical to avoid
        # blocking CI on dev-only vulnerabilities we can't fix.
        run: npm audit --audit-level=critical
