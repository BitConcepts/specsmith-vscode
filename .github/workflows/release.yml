name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build VSIX & publish stable release
    runs-on: ubuntu-latest
    # Only run from stable tags (not -dev, -rc, -alpha, -beta)
    if: "!contains(github.ref_name, '-dev') && !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-alpha') && !contains(github.ref_name, '-beta')"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run lint

      - name: esbuild bundle
        run: npm run build

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package VSIX
        run: vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: specsmith-vscode-vsix
          path: "*.vsix"
          retention-days: 90

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          VSIX_FILE=$(ls *.vsix | head -1)
          TAG="${{ github.ref_name }}"

          echo "Publishing stable release ${TAG} with ${VSIX_FILE}"

          gh release create "${TAG}" "${VSIX_FILE}" \
            --title "specsmith-vscode ${TAG}" \
            --generate-notes \
            --latest || echo "Release already exists — skipping"
